<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Figma Inspect Implementation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="screen">
      <section class="hero" aria-label="Coffee grinder progress interface">
        <header class="top-bar" aria-hidden="true">
          <button class="icon-button" type="button">↶</button>
          <h1>奶咖</h1>
          <button class="icon-button menu-button" type="button">
            <span></span>
            <span></span>
          </button>
        </header>

        <div class="labels" aria-hidden="true">
          <span>咖啡浓度</span>
          <span>风味偏好</span>
        </div>

        <div class="option-rail left-rail" aria-hidden="true">
          <div class="chip chip-active">
            <div class="chip-icon">⊙</div>
            <span>浓郁</span>
          </div>
          <div class="chip">
            <div class="chip-icon">◈</div>
            <span>标准</span>
          </div>
        </div>

        <div class="option-rail right-rail" aria-hidden="true">
          <div class="chip">
            <div class="chip-icon">◈</div>
            <span>标准</span>
          </div>
          <div class="chip">
            <div class="chip-icon">◔</div>
            <span>偏苦</span>
          </div>
        </div>

        <div class="bottom-icons" aria-hidden="true">
          <span>◐</span>
          <span>♙</span>
          <span>◔</span>
          <span>♨</span>
        </div>

        <article class="progress-card" aria-label="Grinding progress">
          <div class="cup-preview">
            <img
              src="https://www.figma.com/api/mcp/asset/105e7ecd-a405-4174-a2b8-d504eca36c8b"
              alt="Coffee grinder dispensing grounds into a portafilter"
            />
          </div>

          <div class="progress-panel">
            <h2>研磨进度</h2>
            <div class="progress-track" aria-hidden="true">
              <div class="progress-fill"></div>
              <div class="progress-glow"></div>
            </div>
            <p class="progress-value">10%</p>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
